spring.application.name=convocatoriasBackend

# Active Database Configuration
# Default: H2 In-Memory Database for local development/testing
spring.datasource.url=jdbc:h2:mem:convocatoriasdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=9a4f2c8d3b7a1e5f8c9d0a2b4c6e8f0a1b3c5d7e9f2a4b6c8d0e2f4a6b8c0d2e
# 1 day expiration (in milliseconds)
jwt.expiration=86400000

